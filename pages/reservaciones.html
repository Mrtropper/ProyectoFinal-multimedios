<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservaciones — Sistema Hotelero</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <header class="navbar">
        <div class="nav-brand">
            <span class="brand-name">Sistema hotelero</span>
        </div>
    </header>

    <main class="page-wrapper">
        <div class="page-header">
            <h1>Gestión de Reservaciones</h1>
            <a href="../index.html" class="back-link">← Volver al panel</a>
        </div>
        
        <div class="panel" id="form-panel">
            <div class="panel-header">
                <h2>Datos para la reservación</h2>
                <button class="btn btn-outline btn-sm" id="btn-nuevo">+ Nuevo</button>
            </div>
            <div class="panel-body">
                <form id="form-res" novalidate>
                    <input type="hidden" id="res-id" />
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="res-cliente">Cliente</label>
                            <select id="res-cliente"><option value="">Cargando...</option></select>
                        </div>
                        <div class="form-group">
                            <label for="res-habitacion">Habitación</label>
                            <select id="res-habitacion"><option value="">Cargando...</option></select>
                        </div>
                        <div class="form-group">
                            <label for="res-fecha-in">Fecha de entrada</label>
                            <input type="date" id="res-fecha-in" />
                        </div>
                        <div class="form-group">
                            <label for="res-fecha-out">Fecha de salida</label>
                            <input type="date" id="res-fecha-out" />
                        </div>
                        <div class="form-group" style="grid-column: 1/-1;">
                            <label for="res-observacion">Observaciones</label>
                            <textarea id="res-observacion" rows="2" placeholder="Notas adicionales..."></textarea>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="btn-guardar">Guardar</button>
                        <button type="button" class="btn btn-outline" onclick="location.reload()">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header"><h2>Reservaciones</h2></div>
            <div class="panel-body">
                <div class="table-wrap" id="tabla-wrap"><div class="spinner"></div></div>
            </div>
        </div>
    </main>

    <footer class="footer"><p>Sistema Hotelero &copy; 2026 — Proyecto Final Multimedios</p></footer>
    <script type="module" src="../js/reservaciones/reservaciones.js"></script>
</body>
</html>
