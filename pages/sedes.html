<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sedes — Sistema Hotelero</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <header class="navbar">
        <div class="nav-brand">
            <span class="brand-name">Sistema hotelero</span>
        </div>
    </header>
    <main class="page-wrapper">
        <div class="page-header">
            <h1>Gestión de Sedes</h1>
            <a href="../index.html" class="back-link">← Volver al panel</a>
        </div>
        
        <div class="panel" id="form-panel">
            <div class="panel-header">
                <h2>Datos de la sede</h2>
                <button class="btn btn-outline btn-sm" id="btn-nuevo">+ Nuevo</button>
            </div>
            <div class="panel-body">
                <form id="form-sede" novalidate>
                    <input type="hidden" id="sede-id" />
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="sede-nombre">Nombre</label>
                            <input type="text" id="sede-nombre" placeholder="Ej: Sede Guanacaste" />
                        </div>
                        <div class="form-group">
                            <label for="sede-direccion">Dirección</label>
                            <input type="text" id="sede-direccion" placeholder="Ej: Frente a la playa flamingo" />
                        </div>
                        <div class="form-group">
                            <label for="sede-telefono">Teléfono</label>
                            <input type="text" id="sede-telefono" placeholder="Ej: 2445-5152" />
                        </div>
                        <div class="form-group">
                            <label for="sede-hotel">Hotel</label>
                            <select id="sede-hotel"><option value="">Cargando hoteles...</option></select>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="btn-guardar">Guardar</button>
                        <button type="button" class="btn btn-outline" id="btn-cancelar">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h2>Sedes</h2>
            </div>
            <div class="panel-body">
                <div class="table-wrap" id="tabla-wrap">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer"><p>Sistema Hotelero &copy; 2026 — Proyecto Final Multimedios</p></footer>
    <script type="module" src="../js/sedes/sedes.js"></script>
    <script>
        document.getElementById('btn-cancelar')?.addEventListener('click', () => location.reload());
    </script>
</body>
</html>
